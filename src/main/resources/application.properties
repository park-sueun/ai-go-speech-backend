spring.application.name=speech

# App
app.base-url=${BASE_URL}

# DATABASE
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:speech}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

# JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=${SHOW_SQL:false}

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-expiration-min=${JWT_ACCESS_TOKEN_EXP_MIN}
jwt.refresh-expiration-days=${JWT_REFRESH_TOKEN_EXP_DAYS}
jwt.reset-secret=${JWT_RESET_SECRET}
jwt.reset-expiration-min=${JWT_RESET_EXPIRATION_MIN}

# SMTP
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.auth-code-expiration-min= ${MAIL_EXPIRATION_MIN}
spring.mail.properties.mail.debug=${MAIL_DEBUG}

# REDIS
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}